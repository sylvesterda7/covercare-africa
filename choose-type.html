<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Shift — CoverCare Africa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <meta name="theme-color" content="#111827" />
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card" style="max-width:520px; text-align:center;">
      <a href="index.html" class="auth-logo">CoverCare Africa</a>
      <h1 class="auth-title">Post a Shift</h1>
      <p style="color:var(--fg-muted); margin-bottom:2rem; font-size:14px;">Who are you posting this shift for?</p>

      <div style="display:flex; flex-direction:column; gap:16px;">
        <a href="client-signup.html" class="post-choice-card">
          <div style="width:48px;height:48px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="ti ti-user" style="font-size:24px; color:#111827;"></i>
          </div>
          <div style="text-align:left;">
            <div style="font-size:15px; font-weight:600; color:#111827; margin-bottom:2px;">I need professional services</div>
            <div style="font-size:13px; color:#6b7280;">Hire a nurse, pharmacist, or caregiver for personal or home care needs.</div>
          </div>
          <i class="ti ti-chevron-right" style="font-size:20px; color:#9ca3af; margin-left:auto; flex-shrink:0;"></i>
        </a>

        <a href="facility-signup.html" class="post-choice-card">
          <div style="width:48px;height:48px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="ti ti-building-hospital" style="font-size:24px; color:#111827;"></i>
          </div>
          <div style="text-align:left;">
            <div style="font-size:15px; font-weight:600; color:#111827; margin-bottom:2px;">I'm a registered facility</div>
            <div style="font-size:13px; color:#6b7280;">Hospital, clinic, pharmacy, or lab needing professional staff.</div>
          </div>
          <i class="ti ti-chevron-right" style="font-size:20px; color:#9ca3af; margin-left:auto; flex-shrink:0;"></i>
        </a>
      </div>

      <p style="margin-top:2rem; font-size:13px; color:var(--fg-muted);">
        Already have an account? <a href="login.html" style="color:#111827; font-weight:500;">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
