<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance – CoverCare Africa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="dashboard-nav">
    <div style="display:flex; align-items:center; gap:12px;">
      <button onclick="toggleSidebar()" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <a href="dashboard-worker.html" class="nav-logo" style="font-family:var(--font-heading);">CoverCare Africa</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser">Loading...</span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="dashboard-sidebar">

      <div class="dashboard-sidebar-card">
        <div class="sidebar-card-title">Your profile</div>
        <div class="profile-card" id="profileCard" style="background:none; border:none; padding:0;">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div class="profile-info">
            <h3 id="profileName">Loading...</h3>
            <p id="profileRole">—</p>
            <p id="profileCity">—</p>
            <div id="profileBadges"></div>
          </div>
        </div>
      </div>

      <div class="dashboard-sidebar-card">
        <div class="sidebar-card-title">Quick actions</div>
        <div class="sidebar-actions">
          <a href="dashboard-worker.html" class="btn-sidebar">Dashboard</a>
          <a href="identity-verify.html" class="btn-sidebar" id="verifyIdentityLink">Verify my identity</a>
          <a href="finance.html" class="btn-sidebar" style="color:#5DCAA5; font-weight:600;">
            <span style="margin-right:6px;">💰</span> Finance
          </a>
          <a href="index.html" class="btn-sidebar">View homepage</a>
        </div>
      </div>

    </aside>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- MAIN -->
    <main class="dashboard-main">

      <div class="dashboard-header">
        <h1>Finance</h1>
        <p>Manage your payout methods and view your earnings.</p>
      </div>

      <!-- Tabs -->
      <div style="display:flex; gap:12px; margin-bottom:2rem; border-bottom:1px solid rgba(255,255,255,0.06); padding-bottom:14px;">
        <button onclick="switchFinTab('methods')" id="finTabMethods" style="background:none; border:none; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; color:#5DCAA5; font-family:inherit;">Payment methods</button>
        <button onclick="switchFinTab('transactions')" id="finTabTransactions" style="background:none; border:none; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; color:rgba(255,255,255,0.4); font-family:inherit;">Transactions</button>
      </div>

      <!-- Payment methods tab -->
      <div id="finMethodsTab" style="max-width:520px;">
        <form id="financeForm" style="display:flex; flex-direction:column; gap:16px;">
          <div class="dashboard-sidebar-card">
            <p style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Bank account</p>
            <div style="display:flex; flex-direction:column; gap:10px;">
              <input id="finBankName" class="glass-input" type="text" placeholder="Bank name (e.g. GC Bank)" />
              <input id="finBankAccount" class="glass-input" type="text" placeholder="Account number" />
              <input id="finBankAccountName" class="glass-input" type="text" placeholder="Account holder name" />
            </div>
          </div>
          <div class="dashboard-sidebar-card">
            <p style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Mobile Money</p>
            <div style="display:flex; flex-direction:column; gap:10px;">
              <select id="finMomoProvider" class="glass-input">
                <option value="">Select provider</option>
                <option value="mtn">MTN Mobile Money</option>
                <option value="vodafone">Vodafone Cash</option>
                <option value="airteltigo">AirtelTigo Money</option>
              </select>
              <input id="finMomoNumber" class="glass-input" type="tel" placeholder="Mobile Money number (e.g. 0244000000)" />
            </div>
          </div>
          <button type="submit" id="finSaveBtn" class="btn-auth" style="align-self:flex-start;">Save payout details</button>
          <div id="finSaveMsg" style="font-size:13px; display:none;"></div>
        </form>
      </div>

      <!-- Transactions tab -->
      <div id="finTransactionsTab" style="display:none;">
        <div class="stats-row" style="margin-bottom:1.5rem;" id="finStatsRow"></div>
        <div class="dashboard-sidebar-card" style="margin-bottom:1.5rem;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <p style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1px;">Monthly earnings</p>
          </div>
          <div id="finChart" style="display:flex; align-items:flex-end; gap:8px; height:180px; padding:12px 0 0;"></div>
        </div>
        <div class="dashboard-sidebar-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <p style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1px;">Transaction history</p>
          </div>
          <div id="finTransactionsList"></div>
        </div>
      </div>

    </main>

  </div>

  <footer>
    <p>© 2025 CoverCare Africa · Accra, Ghana</p>
  </footer>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="finance.js"></script>

</body>
</html>
