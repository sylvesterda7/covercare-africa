<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – CoverCare Africa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>

<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">CoverCare Africa</a>

      <h1>Create your account</h1>
      <p>Join CoverCare Africa as a healthcare professional or facility manager.</p>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <form class="auth-form" id="registerForm">

        <div class="form-group">
          <label for="userType">I am a</label>
          <select id="userType" required>
            <option value="" disabled selected>Select account type</option>
            <option value="worker">Healthcare Professional</option>
            <option value="facility">Facility Manager</option>
            <option value="homecare">Homecare Company</option>
            <option value="public">Individual / Family</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fullname">Full name</label>
          <input type="text" id="fullname" placeholder="e.g. Kwame Mensah" required />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="e.g. kwame@gmail.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
        </div>

        <button type="submit" class="btn-auth" id="registerBtn">Create account</button>

      </form>

      <div class="auth-switch">
        Already have an account?
        <a href="login.html">Sign in</a>
      </div>

      <div class="auth-switch" style="margin-top: 0.75rem;">
        <a href="index.html">← Back to homepage</a>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="register.js"></script>

</body>
</html>
