<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – CoverCare Africa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>

<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-logo" style="font-family:var(--font-heading);">CoverCare Africa</a>

      <h1>Welcome back</h1>
      <p>Sign in to your CoverCare account to manage your shifts and profile.</p>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <form class="auth-form" id="loginForm">

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="e.g. kwame@gmail.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">Sign in</button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <button onclick="signInWithGoogle()" class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle; margin-right:8px;"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continue with Google
      </button>

      <div class="auth-switch">
        Don't have an account?
        <a href="register.html">Create one</a>
      </div>

      <div class="auth-switch" style="margin-top: 0.75rem;">
        <a href="index.html">← Back to homepage</a>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>

</body>
</html>
