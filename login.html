<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – CoverCare Africa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>

<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">CoverCare Africa</a>

      <h1>Welcome back</h1>
      <p>Sign in to your CoverCare account to manage your shifts and profile.</p>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <form class="auth-form" id="loginForm">

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="e.g. kwame@gmail.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">Sign in</button>

      </form>

      <div class="auth-switch">
        Don't have an account?
        <a href="register.html">Create one</a>
      </div>

      <div class="auth-switch" style="margin-top: 0.75rem;">
        <a href="index.html">← Back to homepage</a>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>

</body>
</html>
