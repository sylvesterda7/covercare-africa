<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="https://covercare-africa.vercel.app/favicon.png">
  <link rel="stylesheet" href="auth.css">
  <title>Forgot Password — CoverCare Africa</title>
  <style>
    .auth-card { max-width: 440px; margin: 0 auto; }
    .fp-desc { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-bottom: 28px; line-height: 1.5; }
  </style>
</head>
<body style="background: #031214;">
  <div class="auth-wrap">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:48px;margin-bottom:8px;">&#128231;</div>
        <h1 style="font-size:22px;font-weight:700;color:#fff;margin:0 0 4px;">Reset your password</h1>
        <p class="fp-desc">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <div id="fp-form">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="fp-email" placeholder="you@example.com" required>
        </div>

        <button class="auth-btn" id="fp-btn" onclick="sendResetLink()">Send reset link</button>

        <p style="text-align:center;margin-top:20px;">
          <a href="login.html" class="auth-small-link" style="display:inline;margin:0;">Back to login</a>
        </p>
      </div>

      <div id="fp-success" style="display:none;text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">&#9989;</div>
        <h2 style="font-size:18px;color:#fff;margin:0 0 8px;">Check your email</h2>
        <p style="color:rgba(255,255,255,0.5);font-size:14px;line-height:1.5;">If an account exists with that email, we've sent a password reset link. It may take a few minutes to arrive.</p>
        <a href="login.html" class="auth-btn" style="display:inline-block;margin-top:24px;text-decoration:none;">Back to login</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const _supabase = window.supabase.createClient(CC_CONFIG.SUPABASE_URL, CC_CONFIG.SUPABASE_KEY);

    async function sendResetLink() {
      const email = document.getElementById("fp-email").value.trim();
      if (!email) { ccToast("Please enter your email.", "error"); return; }

      const btn = document.getElementById("fp-btn");
      btn.disabled = true;
      btn.textContent = "Sending...";

      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/login.html"
      });

      btn.disabled = false;
      btn.textContent = "Send reset link";

      if (error) {
        ccToast(error.message, "error");
        return;
      }

      document.getElementById("fp-form").style.display = "none";
      document.getElementById("fp-success").style.display = "block";
    }
  </script>
</body>
</html>
